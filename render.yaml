# ─── Melodizer — Render.com Deployment ────────────────────────────────────────
#
# Single Python web service:
#   - FastAPI serves the REST API at /api/*
#   - FastAPI also serves the pre-built React frontend at /*
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect this repo — Render reads render.yaml automatically
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: melodizer
    runtime: python
    region: oregon

    # Build: install Python deps, build the React frontend, then train the KNN model
    buildCommand: |
      pip install -r backend/requirements.txt
      npm ci --prefix frontend
      npm run build --prefix frontend
      python build_pickle.py --data music.csv --out-dir pickles

    # Start: launch FastAPI — it serves both /api/* and the React SPA
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    # Health check so Render knows the service is ready
    healthCheckPath: /api/health

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
